<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniSwift — Swift on the Web, Powered by WebAssembly</title>
    <meta name="description" content="OmniSwift is a high-performance starter template for building web applications in Swift using ElementaryUI and WebAssembly. Write SwiftUI-like code that runs natively in the browser.">
    <meta name="theme-color" content="#667eea">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0a0a0f;
            color: #e4e4e7;
            overflow-x: hidden;
        }

        #app {
            min-height: 100vh;
        }

        /* Loading screen */
        #loader {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 24px;
            background: #0a0a0f;
        }

        .loader-logo {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: pulse 2s ease-in-out infinite;
        }

        .loader-spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(102, 126, 234, 0.15);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .loader-text {
            font-size: 0.85rem;
            color: rgba(228, 228, 231, 0.4);
            letter-spacing: 0.05em;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(102, 126, 234, 0.3); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(102, 126, 234, 0.5); }

        /* Selection */
        ::selection {
            background: rgba(102, 126, 234, 0.3);
            color: #fff;
        }
    </style>
</head>
<body>
    <div id="loader">
        <div class="loader-logo">OmniSwift</div>
        <div class="loader-spinner"></div>
        <div class="loader-text">Compiling Swift to WebAssembly…</div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
